name: E2E Tests
on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: itpapp
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: Run database migrations
        run: |
          PGPASSWORD=password psql -h localhost -U postgres -d itpapp -f backend/database/schema.sql
          node -e "
            const { Pool } = require('pg');
            const pool = new Pool({ host: 'localhost', user: 'postgres', password: 'password', database: 'itpapp', port: 5432 });
            const fs = require('fs');
            const path = require('path');
            const migrationsDir = path.join('backend', 'database', 'migrations');
            const files = fs.readdirSync(migrationsDir).sort();
            (async () => {
              for (const file of files) {
                if (!file.endsWith('.sql')) continue;
                const sql = fs.readFileSync(path.join(migrationsDir, file), 'utf8');
                await pool.query(sql);
                console.log('Applied:', file);
              }
              await pool.end();
            })();
          "
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: password
          DB_NAME: itpapp
          DB_PORT: 5432

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: password
          DB_NAME: itpapp
          DB_PORT: 5432
          JWT_SECRET: e2e-test-secret
          NODE_ENV: test
          APP_URL: http://localhost:5173
          S3_BUCKET: test-bucket
          CI: true

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: .playwright/
          retention-days: 7
